name: Daily Flight Data Refresh
on:
  schedule:
    # Every day at 03:00 UTC (low-traffic window)
    - cron: '0 3 * * *'
  workflow_dispatch:  # Manual "Run workflow" button in the Actions tab
permissions:
  contents: write
  issues: write        # allows the failure-alert step to open an issue
jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      # No npm install: fetch-flights.js uses only Node built-ins.
      - name: Run flight data fetcher
        run: node scripts/fetch-flights.js
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          TRAVELPAYOUTS_MARKER: ${{ secrets.TRAVELPAYOUTS_MARKER }}
      - name: Validate output
        run: |
          if [ ! -f frontend/data/index.json ]; then
            echo "::error::index.json missing — fetch produced no manifest"
            exit 1
          fi
          ORIGINS=$(node -e "console.log((require('./frontend/data/index.json').origins||[]).length)")
          echo "Origins with data: $ORIGINS"
          if [ "$ORIGINS" -lt 1 ]; then
            echo "::error::manifest has zero origins — refusing to commit empty data"
            exit 1
          fi
      - name: Commit & push updated data
        run: |
          git config user.name "APlusZ Bot"
          git config user.email "bot@aplusz.app"
          git add frontend/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily data refresh — $(date -u +%Y-%m-%d)"
            git push
          fi
      - name: Alert on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Daily flight data fetch failed — $(date -u +%Y-%m-%d)" \
            --body "The daily refresh failed or produced no data. Log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "automated" \
            || echo "Could not open issue (permissions)"
