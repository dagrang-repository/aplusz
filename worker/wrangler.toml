name = "apluszworker"
main = "index.js"
compatibility_date = "2025-01-01"

# Custom domain route — map api.aplusz.app to this Worker in the
# Cloudflare dashboard (Workers & Pages → your Worker → Settings → Domains),
# or uncomment the route below if aplusz.app is on Cloudflare DNS.
route = { pattern = "api.aplusz.app/*", zone_name = "aplusz.app" }

# KV namespace — create it once, then paste its id here:
#   npx wrangler kv namespace create AZKV
[[kv_namespaces]]
binding = "AZKV"
id = "d5aa91ac64c340848c409e47f3e88b97"

# Non-secret vars
[vars]
APP_URL = "https://aplusz.app"
OWNER_EMAIL = "dagrang@gmail.com"

[triggers]
crons = ["37 14 * * *"]

# SECRETS — never put values here. Set them with:
#   npx wrangler secret put STRIPE_SECRET
#   npx wrangler secret put STRIPE_WEBHOOK_SECRET
#   npx wrangler secret put PRICE_PRO
#   npx wrangler secret put PRICE_PROPLUS
#   npx wrangler secret put RESEND_KEY
#   npx wrangler secret put SIGNING_SECRET
#   npx wrangler secret put ADMIN_PASS